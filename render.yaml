services:
  - type: web
    name: lead-platform
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lead-platform-db
          property: connectionString
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: lead-platform-db
    plan: basic-256mb
