services:
  - type: web
    name: lead-platform
    runtime: python
    buildCommand: pip install -r requirements.txt && npm install
    startCommand: uvicorn platform_app.app:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lead-platform-db
          property: connectionString
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: lead-platform-db
    plan: basic-256mb
